
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enchanted Bookshelf | 404 Error Page</title>
<link href='https://fonts.googleapis.com/css?family=Playfair+Display+SC' rel='stylesheet'>
<style>
@import url('https://fonts.googleapis.com/css?family=Dancing+Script:400,700');

body, html {
  height: 100%;
}

body {
  margin: 0;
  padding: 2rem;
  background-color: #eae9ff;
  font-family: monospace;
  color: #182a4e;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  margin-top: 2rem;
  text-align: center;
}

h1 + p {
  text-align: center;
  color: #182a4e;
}

p {
line-height: 1.5rem;
}

.shelf {
  position: relative;
  width: 30rem;
  height: 14rem;
  margin: 0 auto;
  border: 0.5rem solid #8b84f5;
  border-radius: 0.5rem;
  background-color: rgba(255, 255, 255, 0.1);
  perspective: 130rem;
  box-shadow: inset 0 0 2rem rgba(0, 0, 0, 0.2);
}

/* Cabinet style preserved from the previous iteration */
.door {
  position: absolute;
  width: 14.8rem;
  height: 14rem;
  top: 0;
  display: flex;
  box-sizing: border-box;
  padding: 1rem;
  background: linear-gradient(145deg, #a89eff, #7b72e0);
  align-items: center;
  box-shadow: -5px 0 12px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.5);
  outline: 1px solid rgba(255, 235, 255, 0.6);
  z-index: 10;
}

.door::before {
  width: 1.8rem;
  height: 1.8rem;
  border-radius: 50%;
  background: radial-gradient(circle, #ffdfb3, #c29b6e);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  content: "";
}

.door.left {
  left: 0;
  border-radius: 0 0.75rem 0.75rem 0;
  justify-content: flex-end;
  animation: 
    leftDoorOpen 3.5s ease-out forwards 1s,
    leftDoorFlap 15s linear infinite forwards 9s;
  transform-origin: 0 0 0;
}

.door.right {
  right: 0;
  border-radius: 0.75rem 0 0 0.75rem;
  justify-content: flex-start;
  animation: 
    rightDoorOpen 3s ease-out forwards 1.5s,
    rightDoorFlap 10s linear infinite forwards 8s;
  transform-origin: 100% 0 0;
}

/* Pink books with opacity added */
.book {
  position: absolute;
  box-sizing: border-box;
  padding: 0.8rem 2rem 0.8rem 2rem;
  border-radius: 0.25rem;
  background-color: rgba(188, 105, 175, 0.65); /* Pink color with opacity */
  color: #182a4e;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.1rem;
  cursor: pointer;
  box-shadow: inset 0 0 0.75rem rgba(255, 255, 255, 0.1);
  z-index: 5;
  text-decoration: none;
}

.book.home-page {
  transform: rotate(-90deg) translate(-12.4rem, 3rem);
  transform-origin: 0;
}

.book.about-us {
  transform: rotate(-100deg) translate(-13.4rem, 6.1rem);
  transform-origin: 0;
  outline: 1px solid transparent;
}

.book.contact {
  right: 2rem;
  bottom: 0.2rem;
  border-radius: 0.3rem;
}

.book.faq {
  right: 0.8rem;
  bottom: 3.3rem;
  border-radius: 0.3rem;
}

.book.not-found {
  width: 12rem;
  height: 3.5rem;
  border: 2px dashed rgba(188, 105, 175, 0.65);
  background-color: rgba(188, 105, 175, 0.15); /* Extra transparency for the empty spot */
  transform: rotate(-90deg) translate(-12rem, 13rem) scale(1);
  transform-origin: 0;
  cursor: default;
  animation: bookFadeOut 1s 3s infinite forwards;
}

.book.not-found::after {
  display: block;
  width: 10rem;
  padding-left: 5rem;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='30'><path fill='%238b84f5' d='M7.688,3.737C6.1,10.409,4.624,16.982,2.475,23.517c-0.424,1.29,0.724,2.338,1.957,1.916 c5.879-2.021,11.743-4.107,17.409-6.696c1.246-0.572,0.443-2.366-0.815-1.932c-3.856,1.333-7.695,2.69-11.565,3.959 c2.879-2.526,5.485-5.215,9.013-7.17c4.441-2.459,9.299-4.109,14.281-4.915c10.903-1.772,22.052,0.562,31.979,5.04 c9.241,4.162,12.895,8.725,13.164,4.942c0.121-1.69-5.57-4.953-14.125-8.714C53.19,5.292,41.094,3.539,29.636,6.058 c-7.122,1.567-16.708,5.374-22.064,11.544c1.359-4.455,2.461-9.028,3.032-13.563C10.852,2.091,8.12,1.927,7.688,3.737z'/></svg>");
  background-repeat: no-repeat;
  background-size: 4rem;
  background-position: left center;
  font-family: "Dancing Script", cursive;
  text-transform: lowercase;
  font-size: 23px;
  content: "esta página no se encuentra 🤔";
  transform: rotate(90deg) translate(6rem, -1rem);
  opacity: 0.6; 
}

.book:hover:not(.not-found) {
  background-color: rgba(188, 105, 175, 0.85);
}

@keyframes leftDoorOpen {
  60% {transform: rotateY(-115deg)}
  100% {transform: rotateY(-110deg)}
}
@keyframes rightDoorOpen {
  60% {transform: rotateY(125deg)}
  100% {transform: rotateY(120deg)}
}
@keyframes rightDoorFlap {
  0% { transform: rotateY(120deg)}
  5% {transform: rotateY(125deg)}
  15% {transform: rotateY(117deg)}
  25% {transform: rotateY(123deg)}
  30% {transform: rotateY(120deg)}
  100% {transform: rotateY(120deg)}
}
@keyframes leftDoorFlap {
  0% { transform: rotateY(-110deg)}
  5% {transform: rotateY(-115deg)}
  15% {transform: rotateY(-107deg)}
  25% {transform: rotateY(-113deg)}
  30% {transform: rotateY(-110deg)}
  100% {transform: rotateY(-110deg)}
}
@keyframes bookFadeOut {
  50% {border: 1px dashed rgba(255, 255, 255, 0.1);}
}
</style>
</head>
<body>

<nav class="shelf">
  <a href="https://bebell-digital-solutions.github.io/tiendas-digitales/p/" class="book home-page" target="_blank">🛡️ Políticas</a>
  <a href="https://bebell-digital-solutions.github.io/tiendas-digitales/p/about" class="book about-us" target="_blank">💾 Directorio</a>
  <a href="https://bebell-digital-solutions.github.io/tiendas-digitales/p/contact" class="book contact" target="_blank">Contacto 💬</a>
  <a href="https://app.helpdesk.icu/chat/ec476ec3-569d-3340-92ae-0ec1ba0aa489" class="book faq" target="_blank">AYUDA ⁉️</a>
  
  <span class="book not-found"></span>
 
  <span class="door left"></span>
  <span class="door right"></span>
</nav>

<h1>Error 404</h1>


<p>La página que buscas no se encuentra o está bajo mantenimiento.<br>Selecciona una de las opciones disponibles en la biblioteca.</p>

</body>
</html>
